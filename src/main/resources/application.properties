# ===================================================================
# Inventory Management Service - Application Configuration
# ===================================================================
# Spring Boot application with OAuth2, JWT, and RBAC for educational purposes
# ===================================================================

# -------------------------------------------------------------------
# Server Configuration
# -------------------------------------------------------------------
# Server port
server.port=8080

# SSL Configuration - enables HTTPS
# Using the self-signed certificate generated in ssl/keystore.p12
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=inventory

# -------------------------------------------------------------------
# Application Settings
# -------------------------------------------------------------------
spring.application.name=inventory-management

# -------------------------------------------------------------------
# H2 Database Configuration
# -------------------------------------------------------------------
# Use in-memory H2 database for educational purposes
spring.datasource.url=jdbc:h2:mem:inventorydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console - accessible at /h2-console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------------------
# Secret key for signing JWT tokens (should be at least 32 characters)
# In production, use environment variable or secure vault
app.jwt.secret=mySecretKeyForJwtTokenGenerationWhichShouldBeLongEnoughForHS256
# Token expiration: 1 hour (in milliseconds)
app.jwt.expiration=3600000

# -------------------------------------------------------------------
# OAuth2 Authorization Server Settings
# -------------------------------------------------------------------
# Issuer URI for JWT tokens
spring.security.oauth2.authorizationserver.issuer=http://localhost:8080

# -------------------------------------------------------------------
# Logging Configuration
# -------------------------------------------------------------------
# Root logging level
logging.level.root=INFO

# Application-specific logging
logging.level.com.example.inventory=DEBUG

# Spring Security logging - useful for debugging auth issues
logging.level.org.springframework.security=DEBUG

# OAuth2 logging
logging.level.org.springframework.security.oauth2=DEBUG

# Hibernate SQL logging (for educational purposes)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
